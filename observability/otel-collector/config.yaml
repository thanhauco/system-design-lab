# OpenTelemetry Collector configuration.
# Receives OTLP from the monolith and forwards traces to Jaeger.
receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  batch:
    timeout: 1s

exporters:
  # Forward traces to Jaeger's OTLP gRPC endpoint.
  otlp/jaeger:
    endpoint: jaeger:4317
    tls:
      insecure: true
  # Echo a summary to the collector logs for debugging.
  debug:
    verbosity: basic

service:
  pipelines:
    traces:
      receivers: [otlp]
      processors: [batch]
      exporters: [otlp/jaeger, debug]
