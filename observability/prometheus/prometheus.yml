# Prometheus scrape configuration for the SDMP local platform.
global:
  scrape_interval: 5s
  evaluation_interval: 5s

scrape_configs:
  # The monolith exposes Prometheus metrics on /metrics.
  - job_name: sdmp-monolith
    metrics_path: /metrics
    static_configs:
      - targets: ["monolith:8080"]
        labels:
          service: sdmp-monolith
          phase: "1"

  # Prometheus scraping itself (useful for meta-monitoring).
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]
